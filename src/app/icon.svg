<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="512" height="512" rx="120" fill="url(#grad)" />
    
    <!-- Scale math: object is 24x24. For it to be 55% of 512 (= 281x281): scale = 281/24 = ~11.7. Offset = (512 - 281) / 2 = 115 -->
    <g transform="translate(115, 115) scale(11.7)">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.5" stroke-opacity="0.2" fill="white" fill-opacity="0.05" />
        <path d="M8 13L8 16" stroke="white" stroke-width="2.5" stroke-linecap="round" />
        <path d="M12 8L12 16" stroke="white" stroke-width="2.5" stroke-linecap="round" />
        <path d="M16 11L16 16" stroke="white" stroke-width="2.5" stroke-linecap="round" />
    </g>

    <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop stop-color="#818cf8"/>
            <stop offset="0.5" stop-color="#6366f1"/>
            <stop offset="1" stop-color="#9333ea"/>
        </linearGradient>
    </defs>
</svg>
